{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'Icon.jpg' %}">
    <title>Авторизация</title>
    <!-- UIKit CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/css/uikit.min.css" />
    <!-- UIKit JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit-icons.min.js"></script>
</head>
<body>

<div class="uk-container uk-flex uk-flex-center uk-flex-middle" style="min-height: 100vh;">
    <div class="uk-width-1-3@m uk-width-1-2@s">
        <div class="uk-card uk-card-default uk-card-body uk-box-shadow-large">

            <div class="uk-text-center uk-margin-bottom">
                <img src="{% static 'Logo.png' %}" alt="Логотип" style="height: 60px;">
            </div>

            <h2 class="uk-card-title uk-text-center">Авторизация</h2>

            <form method="post" class="uk-form-stacked">
                {% csrf_token %}

                <div class="uk-margin">
                    <label class="uk-form-label" for="login">Логин</label>
                    <div class="uk-form-controls">
                        <input class="uk-input" type="text" id="login" name="login" placeholder="Введите логин" required>
                    </div>
                </div>

                <div class="uk-margin">
                    <label class="uk-form-label" for="password">Пароль</label>
                    <div class="uk-form-controls">
                        <input class="uk-input" type="password" id="password" name="password" placeholder="Введите пароль" required>
                    </div>
                </div>

                <div class="uk-margin">
                    <button class="uk-button uk-button-primary uk-width-1-1" type="submit">Войти</button>
                </div>

                {% if error %}
                <div class="uk-alert-danger" uk-alert>
                    <p>{{ error }}</p>
                </div>
                {% endif %}
            </form>

            <div class="uk-text-center uk-margin-top">
                <a href="{% url 'main_page' %}" class="uk-link-text">
                    <span uk-icon="arrow-left"></span> Вернуться на главную как гость
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
